<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puppy Lovers Page</title>
    <!-- Bootstrap Only -->
    <link rel="stylesheet" href="css/bootstrap.css" />
    <!-- Custom Only -->
    <link rel="stylesheet" href=".//css/styles.css" />
  </head>
  <body>
    <header>
      <h1 class="Bblue text-center p-3">Puppy Lovers Page</h1>
    </header>
    <main>
      <section class="puppy_banner mb-5">
        <div>
          <img src="../../images/banner-puppies.jpg" alt="" />
        </div>
      </section>
      <div class="container">
        <section class="puppies-section">
          <div class="row">
            <div class="puppy-1 mb-5 col-md-4 mb-md-0">
              <img src="../../images/puppy-1.jpg" alt="" />
            </div>
            <div
              class="missing_puppy d-none d-md-block col-md-4 pr-5 pl-5 pt-5"
            >
              <p class="text-center fw-bold">Puppy missing here!!</p>
            </div>
            <div class="col-md-4">
              <img src="../../images/puppy-2.jpg " alt="" />
            </div>
          </div>
        </section>

        <section class="text-center my-5">
          <h2 class="more_puppiesfw-bold">More Puppies</h2>
        </section>
        <section class="container">
          <div class="row">
            <div class="mb-5 col-md-6 mb-md-0">
              <img src="../../images/puppy-3.jpg" alt="" />
            </div>
            <div class="col-md-6">
              <img src="../../images/puppy-4.jpg" alt="" />
            </div>
          </div>
        </section>
      </div>
    </main>
    <footer class="Bblue text-center p-5 mt-5">
      <h2>Developed by: Tamirat Tezera</h2>
    </footer>
  </body>
</html>
